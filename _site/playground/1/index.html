  /* Korean web fonts for genre-specific typography */

  .playground-wrap {
    position: relative;
    margin: -6rem -1.5rem 0;
    min-height: 100vh;
    padding: 4rem 2rem 6rem;
    overflow: hidden;
    cursor: crosshair;
  }

  .playground-header {
    max-width: 720px;
    margin: 0 auto 2rem;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .playground-header h1 {
    font-family: "Lora", Georgia, serif;
    font-size: 1.6rem;
    margin: 0 0 0.5rem;
  }

  .playground-header p {
    font-size: 0.9rem;
    color: var(--muted);
    margin: 0 0 0.3rem;
  }

  .playground-header .hint {
    font-size: 0.8rem;
    color: #888;
    font-style: italic;
  }

  .genre-picker {
    max-width: 900px;
    margin: 0 auto 3rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .genre-btn {
    font-family: "Lato", sans-serif;
    font-size: 0.78rem;
    padding: 0.35rem 0.75rem;
    background: transparent;
    border: 1px solid #d0d0d0;
    border-radius: 999px;
    cursor: pointer;
    color: var(--fg);
    transition: all 0.15s ease;
  }

  .genre-btn:hover { border-color: var(--fg); }

  .genre-btn.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .stage {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  .telop {
    position: absolute;
    white-space: nowrap;
    pointer-events: none;
    transform: translate(-50%, -50%);
    will-change: transform, opacity;
    animation: telop-life var(--life) ease-out forwards;
    text-shadow: 0 0 8px rgba(255,255,255,0.3), 0 0 2px rgba(0,0,0,0.15);
  }

  @keyframes telop-life {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
    25%  { transform: translate(-50%, -50%) scale(1); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, calc(-50% - 20px)) scale(1); }
  }

  .current-genre-label {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: "Lora", serif;
    font-size: 0.85rem;
    color: #999;
    z-index: 2;
    pointer-events: none;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 1rem;
    font-size: 0.85rem;
  }
</style>

<div class="playground-wrap">

// ---- utilities ----
function rand(min, max) { return Math.random() * (max - min) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// HSV (0-360, 0-100, 0-100) → CSS hsl() string
function hsvToHsl(h, s, v) {
  s /= 100; v /= 100;
  const l = v - v * s / 2;
  const m = Math.min(l, 1 - l);
  const sl = m ? (v - l) / m : 0;
  return `hsl(${h}, ${sl * 100}%, ${l * 100}%)`;
}

function sampleColor(g) {
  const h = rand(g.hue[0], g.hue[1]) % 360;
  const s = rand(g.sat[0], g.sat[1]);
  let v;
  if (g.bimodal) {
    // pick from either low or high extreme
    v = Math.random() < 0.5 ? rand(0, 20) : rand(80, 100);
  } else {
    v = rand(g.val[0], g.val[1]);
  }
  return hsvToHsl(h, s, v);
}

// ---- state ----
let currentGenre = 'Entertainment';
let lastSpawn = 0;
const SPAWN_COOLDOWN_BASE = 20; // ms, scaled by freq

// ---- genre picker UI ----
const picker = document.getElementById('genrePicker');
const label = document.getElementById('genreLabel');

Object.keys(GENRES).forEach(name => {
  const btn = document.createElement('button');
  btn.className = 'genre-btn';
  btn.textContent = name;
  btn.addEventListener('click', () => {
    currentGenre = name;
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    label.textContent = name;
  });
  if (name === currentGenre) btn.classList.add('active');
  picker.appendChild(btn);
});
label.textContent = currentGenre;

// ---- telop spawning ----
const stage = document.getElementById('stage');

function spawnTelop(x, y) {
  const g = GENRES[currentGenre];
  const el = document.createElement('div');
  el.className = 'telop';
  el.textContent = pick(g.words);

  // slight jitter around cursor
  const jitterX = rand(-60, 60);
  const jitterY = rand(-40, 40);
  el.style.left = (x + jitterX) + 'px';
  el.style.top = (y + jitterY) + 'px';

  el.style.fontFamily = g.font;
  el.style.fontWeight = g.weight;
    const exaggerated = 43 + (g.size - 43) * 1.8;
    el.style.fontSize = (exaggerated + rand(-3, 3)) + 'px';
  el.style.color = sampleColor(g);

  // slight rotation for playful genres
  const rotateGenres = ['Entertainment', 'FUN', 'Kids', 'Pets & Animals', 'Gaming'];
  if (rotateGenres.includes(currentGenre)) {
    el.style.transform = `translate(-50%, -50%) rotate(${rand(-8, 8)}deg)`;
  }

  const life = rand(1200, 2000);
  el.style.setProperty('--life', life + 'ms');

  stage.appendChild(el);
  setTimeout(() => el.remove(), life + 100);
}

// ---- mouse tracking ----
document.addEventListener('mousemove', (e) => {
  const now = performance.now();
  const g = GENRES[currentGenre];
  // cooldown inversely proportional to freq
  const cooldown = SPAWN_COOLDOWN_BASE / Math.max(g.freq, 0.03);
  if (now - lastSpawn < cooldown) return;
  lastSpawn = now;
  // spawn probability also influenced by freq
  if (Math.random() < Math.min(g.freq * 4, 1)) {
    spawnTelop(e.clientX, e.clientY);
  }
});

// touch support
document.addEventListener('touchmove', (e) => {
  const t = e.touches[0];
  if (!t) return;
  const now = performance.now();
  const g = GENRES[currentGenre];
  const cooldown = SPAWN_COOLDOWN_BASE / Math.max(g.freq, 0.03);
  if (now - lastSpawn < cooldown) return;
  lastSpawn = now;
  if (Math.random() < Math.min(g.freq * 4, 1)) {
    spawnTelop(t.clientX, t.clientY);
  }
}, { passive: true });
</script>

  <script>
  (function() {
    // UNIST, Ulsan
    const lat = 35.5384;
    const lon = 129.2540;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`;

    function describe(code) {
      if (code === 0) return ['☀️', 'clear'];
      if (code <= 3) return ['⛅', 'partly cloudy'];
      if (code <= 48) return ['🌫️', 'foggy'];
      if (code <= 57) return ['🌦️', 'drizzling'];
      if (code <= 67) return ['🌧️', 'rainy'];
      if (code <= 77) return ['❄️', 'snowy'];
      if (code <= 82) return ['🌦️', 'showering'];
      if (code <= 86) return ['🌨️', 'snowing'];
      if (code <= 99) return ['⛈️', 'thunderstorming'];
      return ['', ''];
    }

    fetch(url)
      .then(r => r.json())
      .then(data => {
        const temp = Math.round(data.current.temperature_2m);
        const [emoji, label] = describe(data.current.weather_code);
        document.getElementById('weather').textContent =
          `Ulsan is ${label} ${emoji} ${temp}°C`;
      })
      .catch(() => {
        document.getElementById('weather').textContent = 'Ulsan';
      });
  })();

  (function() {
    const clock = document.getElementById('clock');
    function tick() {
      const now = new Date().toLocaleTimeString('en-GB', {
        timeZone: 'Asia/Seoul',
        hour: '2-digit',
        minute: '2-digit'
      });
      clock.textContent = `It's ${now} in Ulsan`;
    }
    tick();
    setInterval(tick, 1000 * 30);
  })();
  </script>
